name: Bug report
description: Report a reproducible scanner or reporter problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Do not include live credentials, private prompts, or sensitive scan output.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the expected and actual behavior.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Aegis version
      placeholder: 0.1.0
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version and operating system
      placeholder: Node 20.18.0 on macOS 15
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal sanitized reproduction
      render: shell
    validations:
      required: true
