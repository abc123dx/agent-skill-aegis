name: 检测规则提案
description: 提议一条确定、可测试的 MCP 或 Agent Skill 安全规则。
title: "[规则] "
labels:
  - enhancement
  - rule
body:
  - type: textarea
    id: threat
    attributes:
      label: 威胁模型
      description: 这条规则应检测哪种攻击行为或不安全配置？
    validations:
      required: true
  - type: textarea
    id: signal
    attributes:
      label: 确定性信号
      description: 描述一个无需大模型或网络请求即可观察的信号。
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: 正例与反例
      description: 只能使用合成数据。
    validations:
      required: true
